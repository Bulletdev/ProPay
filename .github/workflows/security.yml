name: Security Scan

on:
  schedule:
    - cron: '0 1 * * *'
  pull_request:
    branches: [main]

jobs:
  brakeman:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: ruby/setup-ruby@v1
        with:
          ruby-version: '3.4'
          bundler-cache: true

      - name: Brakeman
        run: bundle exec brakeman --no-pager -w2

      - name: Bundle audit
        run: |
          gem install bundler-audit
          bundle-audit check --update
